<h1>Exemplo NgIf</h1>
<button (click)="clickAmarelo()" class="btn btn-primary mr-3">Amarelo</button>
<button (click)="clickVermelho()" class="btn btn-primary mr-3">Vermelho</button>

<div class="containerPai">
    <div *ngIf="containerAmarelo" class="divAmarelo">Container Amarelo</div>
    <div *ngIf="containerVermelho" class="divVermelho">Container Vermelho</div>
</div>
