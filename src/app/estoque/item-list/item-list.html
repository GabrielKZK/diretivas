<div class="card p-3 shadow-sm">
  <h4>Itens em Estoque</h4>
  <table class="table table-hover mt-3">
    <thead class="table-light">
      <tr>
        <th>Nome</th>
        <th>Quantidade</th>
        <th class="text-center">Ações</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of itens">
        <td>{{ item.nome }}</td>
        <td><span class="badge bg-info text-dark">{{ item.quantidade }}</span></td>
        <td class="text-center">
          <button class="btn btn-outline-success btn-sm me-1" (click)="entrada(item.id)">+</button>
          <button class="btn btn-outline-warning btn-sm me-1" (click)="saida(item.id)">-</button>
          <button class="btn btn-danger btn-sm" (click)="deletar(item.id)">Excluir</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
