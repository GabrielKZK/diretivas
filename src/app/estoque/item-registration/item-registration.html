<div class="card p-3 mb-4 border-primary shadow-sm">
  <h4 class="text-primary mb-3">Cadastrar Item</h4>
  <div class="row g-2">
    <div class="col-md-7">
      <input type="text" #nomeInput class="form-control" placeholder="Nome do item">
    </div>
    <div class="col-md-3">
      <input type="number" #qtdInput class="form-control" value="0">
    </div>
    <div class="col-md-2">
      <button class="btn btn-primary w-100" 
        (click)="salvar(nomeInput.value, qtdInput.value); nomeInput.value=''; qtdInput.value='0'">
        OK
      </button>
    </div>
  </div>
</div>
